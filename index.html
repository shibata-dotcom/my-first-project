<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>柴田哲也 | 税理士</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: #f5f5f0;
      color: #333;
      line-height: 1.8;
    }

    header {
      background-color: #2c3e50;
      color: #fff;
      padding: 60px 20px;
      text-align: center;
    }

    header .name {
      font-size: 2.4rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    header .title {
      font-size: 1.1rem;
      color: #a8c0d6;
      letter-spacing: 0.15em;
    }

    main {
      max-width: 720px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 40px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      margin-bottom: 32px;
    }

    .card h2 {
      font-size: 1rem;
      color: #2c3e50;
      border-left: 4px solid #2c3e50;
      padding-left: 12px;
      margin-bottom: 24px;
      letter-spacing: 0.08em;
    }

    .info-row {
      display: flex;
      padding: 14px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.97rem;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      width: 120px;
      flex-shrink: 0;
      color: #888;
      font-size: 0.88rem;
    }

    .info-value {
      font-weight: 500;
    }

    .message {
      font-size: 0.97rem;
      color: #555;
    }

    footer {
      text-align: center;
      padding: 32px 20px;
      color: #aaa;
      font-size: 0.82rem;
    }
  </style>
</head>
<body>

  <header>
    <div class="name">柴田 哲也</div>
    <div class="title">税理士 ／ 哲也事務所</div>
  </header>

  <main>

    <div class="card">
      <h2>プロフィール</h2>
      <div class="info-row">
        <span class="info-label">氏名</span>
        <span class="info-value">柴田 哲也（しばた てつや）</span>
      </div>
      <div class="info-row">
        <span class="info-label">職業</span>
        <span class="info-value">税理士</span>
      </div>
      <div class="info-row">
        <span class="info-label">事務所</span>
        <span class="info-value">哲也事務所</span>
      </div>
    </div>

    <div class="card">
      <h2>ご挨拶</h2>
      <p class="message">
        はじめまして。税理士の柴田哲也です。<br>
        哲也事務所では、個人・法人を問わず、税務申告・記帳代行・経営相談など、
        お客様の状況に寄り添ったサポートをご提供しています。<br><br>
        「税のことは、まず相談から」をモットーに、わかりやすい説明と迅速な対応を
        心がけております。お気軽にご連絡ください。
      </p>
    </div>

  </main>

  <footer>
    &copy; 2026 哲也事務所 All rights reserved.
  </footer>

</body>
</html>
