<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>柴田哲也 | 税理士</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: linear-gradient(135deg, #ddeeff 0%, #eaf4fb 60%, #f0f8ff 100%);
      min-height: 100vh;
      color: #333;
      line-height: 1.8;
    }

    header {
      background: linear-gradient(135deg, #1a3a5c 0%, #2e6fa3 100%);
      color: #fff;
      padding: 72px 20px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -24px;
      left: 0;
      width: 100%;
      height: 48px;
      background: linear-gradient(135deg, #ddeeff 0%, #eaf4fb 100%);
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    header .name {
      font-size: 2.6rem;
      font-weight: bold;
      letter-spacing: 0.15em;
      margin-bottom: 10px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    header .title {
      font-size: 1.05rem;
      color: #b8d8f0;
      letter-spacing: 0.2em;
    }

    main {
      max-width: 720px;
      margin: 72px auto 48px;
      padding: 0 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 24px rgba(46, 111, 163, 0.10), 0 1px 4px rgba(0,0,0,0.04);
      margin-bottom: 28px;
      border: 1px solid rgba(180, 215, 245, 0.5);
    }

    .card h2 {
      font-size: 0.9rem;
      color: #2e6fa3;
      border-left: 4px solid #2e6fa3;
      padding-left: 12px;
      margin-bottom: 24px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .info-row {
      display: flex;
      padding: 14px 0;
      border-bottom: 1px solid #e8f2fa;
      font-size: 0.97rem;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      width: 120px;
      flex-shrink: 0;
      color: #7aafc8;
      font-size: 0.88rem;
    }

    .info-value {
      font-weight: 600;
      color: #1e3a52;
    }

    .message {
      font-size: 0.97rem;
      color: #4a6070;
    }

    footer {
      text-align: center;
      padding: 32px 20px;
      color: #8ab0c8;
      font-size: 0.82rem;
    }

    .side-panel {
      position: fixed;
      top: 0;
      width: 220px;
      height: 100vh;
      overflow: hidden;
      z-index: 0;
    }

    .side-panel.left  { left: 0; }
    .side-panel.right { right: 0; }

    .side-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .side-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(220, 238, 255, 0.45), transparent);
    }

    .side-panel.right::after {
      background: linear-gradient(to left, rgba(220, 238, 255, 0.45), transparent);
    }

    @media (max-width: 1200px) {
      .side-panel { display: none; }
    }
  </style>
</head>
<body>

  <div class="side-panel left">
    <img src="https://images.unsplash.com/photo-1448375240586-882707db888b?w=440&fit=crop&crop=center" alt="森の風景">
  </div>
  <div class="side-panel right">
    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=440&fit=crop&crop=center" alt="山と湖の風景">
  </div>

  <header>
    <div class="name">柴田 哲也</div>
    <div class="title">税理士 ／ 哲也事務所</div>
  </header>

  <main>

    <div class="card">
      <h2>プロフィール</h2>
      <div class="info-row">
        <span class="info-label">氏名</span>
        <span class="info-value">柴田 哲也（しばた てつや）</span>
      </div>
      <div class="info-row">
        <span class="info-label">職業</span>
        <span class="info-value">税理士</span>
      </div>
      <div class="info-row">
        <span class="info-label">事務所</span>
        <span class="info-value">哲也事務所</span>
      </div>
    </div>

    <div class="card">
      <h2>ご挨拶</h2>
      <p class="message">
        はじめまして。税理士の柴田哲也です。<br>
        哲也事務所では、個人・法人を問わず、税務申告・記帳代行・経営相談など、
        お客様の状況に寄り添ったサポートをご提供しています。<br><br>
        「税のことは、まず相談から」をモットーに、わかりやすい説明と迅速な対応を
        心がけております。お気軽にご連絡ください。
      </p>
    </div>

  </main>

  <footer>
    &copy; 2026 哲也事務所 All rights reserved.
  </footer>

</body>
</html>
