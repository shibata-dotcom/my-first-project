<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消費税計算機 | 哲也事務所</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: #f0f4f8;
      color: #1a2e42;
      line-height: 1.7;
      min-height: 100vh;
    }

    header {
      background-color: #1a3a5c;
      color: #fff;
      padding: 28px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: bold;
      letter-spacing: 0.1em;
    }

    header p {
      font-size: 0.82rem;
      color: #a8c0d6;
      margin-top: 4px;
      letter-spacing: 0.05em;
    }

    main {
      max-width: 520px;
      margin: 40px auto;
      padding: 0 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 2px 16px rgba(26, 58, 92, 0.08);
      margin-bottom: 20px;
    }

    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #1a3a5c;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* 計算モード切替 */
    .mode-toggle {
      display: flex;
      border: 2px solid #1a3a5c;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .mode-toggle input[type="radio"] {
      display: none;
    }

    .mode-toggle label {
      flex: 1;
      text-align: center;
      padding: 10px 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      color: #1a3a5c;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.02em;
    }

    .mode-toggle input[type="radio"]:checked + label {
      background-color: #1a3a5c;
      color: #fff;
    }

    /* 税率選択 */
    .rate-group {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .rate-option {
      flex: 1;
    }

    .rate-option input[type="radio"] {
      display: none;
    }

    .rate-option label {
      display: block;
      text-align: center;
      padding: 10px;
      border: 2px solid #d0dde8;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      color: #5a7a96;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .rate-option label span {
      display: block;
      font-size: 0.72rem;
      font-weight: 400;
      margin-top: 2px;
      color: #8aa4b8;
    }

    .rate-option input[type="radio"]:checked + label {
      border-color: #1a3a5c;
      color: #1a3a5c;
      background-color: #eef3f8;
    }

    /* 金額入力 */
    .input-group {
      margin-bottom: 8px;
    }

    .input-group label {
      display: block;
      font-size: 0.82rem;
      color: #5a7a96;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input[type="number"] {
      width: 100%;
      padding: 12px 48px 12px 16px;
      font-size: 1.2rem;
      font-family: inherit;
      border: 2px solid #d0dde8;
      border-radius: 8px;
      color: #1a2e42;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    .input-wrap input[type="number"]::-webkit-inner-spin-button,
    .input-wrap input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }

    .input-wrap input[type="number"]:focus {
      border-color: #1a3a5c;
    }

    .input-unit {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.88rem;
      color: #8aa4b8;
      pointer-events: none;
    }

    .input-note {
      font-size: 0.75rem;
      color: #8aa4b8;
      margin-top: 6px;
    }

    /* 結果 */
    .result-card {
      background: #f5f8fb;
      border-radius: 12px;
      padding: 28px 32px;
      box-shadow: 0 2px 16px rgba(26, 58, 92, 0.08);
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #e0e8f0;
      font-size: 0.95rem;
    }

    .result-row:last-child {
      border-bottom: none;
    }

    .result-label {
      color: #5a7a96;
      font-size: 0.88rem;
    }

    .result-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a2e42;
      letter-spacing: 0.02em;
    }

    .result-row.highlight {
      background: #1a3a5c;
      border-radius: 8px;
      padding: 14px 16px;
      margin: 8px -16px 0;
    }

    .result-row.highlight .result-label {
      color: #a8c0d6;
      font-size: 0.88rem;
    }

    .result-row.highlight .result-value {
      color: #fff;
      font-size: 1.25rem;
    }

    .empty-state {
      text-align: center;
      color: #b0c4d4;
      font-size: 0.9rem;
      padding: 16px 0;
    }

    footer {
      text-align: center;
      padding: 28px 20px;
      color: #a0b4c4;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>消費税計算機</h1>
    <p>哲也事務所</p>
  </header>

  <main>

    <div class="card">

      <!-- 計算モード -->
      <div class="section-label">計算モード</div>
      <div class="mode-toggle">
        <input type="radio" name="mode" id="mode-ex" value="exclusive" checked>
        <label for="mode-ex">税抜 → 税込</label>
        <input type="radio" name="mode" id="mode-in" value="inclusive">
        <label for="mode-in">税込 → 税抜</label>
      </div>

      <!-- 税率 -->
      <div class="section-label">税率</div>
      <div class="rate-group">
        <div class="rate-option">
          <input type="radio" name="rate" id="rate-10" value="0.10" checked>
          <label for="rate-10">10%<span>標準税率</span></label>
        </div>
        <div class="rate-option">
          <input type="radio" name="rate" id="rate-8" value="0.08">
          <label for="rate-8">8%<span>軽減税率</span></label>
        </div>
      </div>

      <!-- 金額入力 -->
      <div class="input-group">
        <label id="input-label">税抜金額を入力</label>
        <div class="input-wrap">
          <input type="number" id="amount-input" placeholder="0" min="0">
          <span class="input-unit">円</span>
        </div>
        <div class="input-note">※ 消費税額は円未満を切り捨てて計算します</div>
      </div>

    </div>

    <!-- 計算結果 -->
    <div class="result-card">
      <div class="section-label">計算結果</div>
      <div id="result-area">
        <div class="empty-state">金額を入力すると結果が表示されます</div>
      </div>
    </div>

  </main>

  <footer>
    &copy; 2026 哲也事務所 All rights reserved.
  </footer>

  <script>
    const amountInput = document.getElementById('amount-input');
    const inputLabel = document.getElementById('input-label');
    const resultArea = document.getElementById('result-area');
    const modeRadios = document.querySelectorAll('input[name="mode"]');
    const rateRadios = document.querySelectorAll('input[name="rate"]');

    function getMode() {
      return document.querySelector('input[name="mode"]:checked').value;
    }

    function getRate() {
      return parseFloat(document.querySelector('input[name="rate"]:checked').value);
    }

    function formatYen(num) {
      return num.toLocaleString('ja-JP') + ' 円';
    }

    function updateLabel() {
      inputLabel.textContent = getMode() === 'exclusive'
        ? '税抜金額を入力'
        : '税込金額を入力';
    }

    function calculate() {
      const raw = amountInput.value;
      const amount = parseInt(raw, 10);

      if (raw === '' || isNaN(amount) || amount < 0) {
        resultArea.innerHTML = '<div class="empty-state">金額を入力すると結果が表示されます</div>';
        return;
      }

      const rate = getRate();
      const mode = getMode();

      let taxExclusive, taxAmount, taxInclusive;

      if (mode === 'exclusive') {
        taxExclusive = amount;
        taxAmount    = Math.floor(amount * rate);
        taxInclusive = taxExclusive + taxAmount;
      } else {
        taxInclusive = amount;
        taxExclusive = Math.floor(amount / (1 + rate));
        taxAmount    = taxInclusive - taxExclusive;
      }

      resultArea.innerHTML = `
        <div class="result-row">
          <span class="result-label">税抜金額</span>
          <span class="result-value">${formatYen(taxExclusive)}</span>
        </div>
        <div class="result-row">
          <span class="result-label">消費税額（${(rate * 100).toFixed(0)}%）</span>
          <span class="result-value">${formatYen(taxAmount)}</span>
        </div>
        <div class="result-row highlight">
          <span class="result-label">税込金額</span>
          <span class="result-value">${formatYen(taxInclusive)}</span>
        </div>
      `;
    }

    amountInput.addEventListener('input', calculate);
    modeRadios.forEach(r => r.addEventListener('change', () => {
      updateLabel();
      calculate();
    }));
    rateRadios.forEach(r => r.addEventListener('change', calculate));
  </script>

</body>
</html>
